<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft • 3D Explorer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fa; color: #1a1a1a; overflow: hidden; height: 100vh;
    }

    .header {
      background: white;
      padding: 16px 20px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      z-index: 200;
      gap: 12px;
    }

    .hamburger {
      font-size: 28px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 8px;
      flex-shrink: 0;
    }

    .menu-label {
      font-size: 1.05rem;
      font-weight: 500;
      color: #444;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .current-model {
      margin: 0 auto;
      font-size: 1.35rem;
      font-weight: 600;
      color: #0b3d91;
      text-align: center;
      flex: 1;
    }

    /* Floating Menu */
    .model-menu {
      position: absolute;
      top: 78px;
      left: 32px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.15);
      min-width: 280px;
      max-width: 400px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 300;
      opacity: 0;
      transform: translateY(-15px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .model-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .model-item {
      padding: 16px 28px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }

    .model-item:last-child { border-bottom: none; }
    .model-item:hover { background: #f8f9fa; }
    .model-item.active { background: #e6f0ff; color: #0b3d91; }

    .model-name {
      font-weight: 500;
      font-size: 1.08rem;
    }

    .info-btn {
    background: #555;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.95rem;
    cursor: pointer;
    margin-right: 12px;
    }

  .info-btn:hover {
    background: #333;
  }

  /* Info Panel */
  .info-panel {
    position: absolute;
    top: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: white;
    border: 1px solid #ddd;
    border-radius: 12px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    padding: 24px;
    width: 90%;
    max-width: 620px;
    max-height: 420px;        /* Fixed max height */
    overflow-y: auto;         /* Enable scrolling */
    display: none;            /* Start hidden */
    z-index: 150;
  }

  .info-panel.open {
    display: block;
  }

  .info-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .close-btn {
    background: none;
    border: none;
    font-size: 28px;
    color: #999;
    cursor: pointer;
  }

    model-viewer {
      width: 100%;
      height: calc(100vh - 72px);
      background: #f8f9fa;
    }

    .download-btn {
      background: #0b3d91;
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      flex-shrink: 0;
    }

    .download-btn:hover {
      background: #0a2e70;
    }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666;
      z-index: 400;
      display: none;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #eee;
      border-top: 5px solid #0b3d91;
      border-radius: 50%;
      animation: spin 1.3s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <button class="hamburger" id="hamburger">☰</button>
    <span class="menu-label">Select Model</span>
    <div class="current-model" id="current-model">—</div>
    
    <button id="info-btn" class="info-btn">Spacecraft Info</button>
    
    <button id="download-btn" class="download-btn">↓ Download Model</button>
  </div>

  <!-- Floating Menu -->
  <div class="model-menu" id="model-menu">
    <div id="model-list"></div>
  </div>

  <model-viewer id="viewer"
    camera-controls
    auto-rotate="false"
    shadow-intensity="1.0"
    exposure="0.95"
    environment-intensity="0.9"
    ar
    ar-modes="webxr scene-viewer quick-look">

    <!-- Info Panel -->
    <div class="info-panel" id="info-panel">
      <div class="info-panel-header">
        <h3 id="info-title">Description</h3>
        <button class="close-btn" id="close-info">×</button>
      </div>
      <p id="info-content">Placeholder Text</p> 
    </div>

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading model...</div>
    </div>

  </model-viewer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const modelMenu = document.getElementById('model-menu');
    const viewer = document.getElementById('viewer');
    const currentTitle = document.getElementById('current-model');
    const downloadBtn = document.getElementById('download-btn');
    const loadingEl = document.getElementById('loading');

    let currentModelName = null;
    let menuOpen = false;
    let infoOpen = false;

    const isLocal = location.hostname === "localhost" || 
                    location.hostname === "127.0.0.1" || 
                    location.protocol === "file:";

    // Hamburger menu toggle
    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      menuOpen = !menuOpen;
      modelMenu.classList.toggle('open', menuOpen);
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !modelMenu.contains(e.target)) {
        menuOpen = false;
        modelMenu.classList.remove('open');
      }
    });

    // Spacecraft Info button
    const infoBtn = document.getElementById('info-btn');
    const infoPanel = document.getElementById('info-panel');

    infoBtn.addEventListener('click', () => {
      infoPanel.classList.toggle('open');
    });

    // Close with X button
    document.getElementById('close-info').addEventListener('click', () => {
      infoPanel.classList.remove('open');
    });

    // Ensure info panel starts hidden
    // document.getElementById('info-panel').style.display = 'none';

    document.getElementById('info-panel').classList.remove('open');

    async function loadModels() {
      try {
        const res = await fetch('models.json');
        const data = await res.json();
        const models = data.Models || [];

        models.forEach((model, i) => {
          console.log(`Loading ${model.DisplayName}`)
          const div = document.createElement('div');
          div.className = 'model-item';
          div.innerHTML = `<span class="model-name">${model.DisplayName}</span>`;


          div.onclick = () => {
            loadModel(model);
            if (window.innerWidth < 900) {
              menuOpen = false;
              modelMenu.classList.remove('open');
            }
          };
          document.getElementById('model-list').appendChild(div);

          if (i === 0) loadModel(model);
        });
      } catch (e) {
        console.error("Failed to load models.json", e);
      }
    }

    function loadModel(model) {
      if (currentModelName === model.ModelName) return;
      currentModelName = model.ModelName;

      const glbUrl = isLocal 
        ? `../../models/${model.FolderName}/${model.glbFileName}`
        : `https://media.githubusercontent.com/media/matthewgiarra/spacecraft-models/refs/heads/main/models/${model.FolderName}/${model.glbFileName}`;

      loadingEl.style.display = 'block';
      viewer.src = glbUrl;

      // Update the panel display name
      currentTitle.textContent = model.DisplayName;

      // Update info panel title
      document.getElementById('info-title').innerHTML = `${model.FullName}`;

      // Convert \n to <br> and render as HTML
      let descriptionHTML = model.Description 
        ? model.Description.replace(/\n/g, '<br>') 
        : "<em>No description available.</em>";

      // Add additional text with link
      // descriptionHTML += '<hr style="margin: 25px 0 25px 0;">';
      descriptionHTML += `<br><br><a href="${model.eotssURL}" target="_blank" style="color: #0b3d91;">Click here to view ${model.DisplayName || model.name} at NASA Eyes On The Solar System</a>`;

      document.getElementById('info-content').innerHTML = descriptionHTML;

      downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.href = glbUrl;
        link.download = `${model.glbFileName}`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      viewer.addEventListener('load', () => {
        loadingEl.style.display = 'none';
      }, { once: true });
    }

    // Initialize
    loadModels();
  </script>
</body>
</html>
