<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft • 3D Explorer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fa; color: #1a1a1a; overflow: hidden; height: 100vh;
    }

    .header {
      background: white;
      padding: 20px 32px;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
      align-items: center;
      z-index: 200;
    }

    .hamburger {
      font-size: 30px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      padding: 4px 12px;
      margin-right: 16px;
    }

    .menu-label {
      font-size: 1.15rem;
      font-weight: 500;
      color: #444;
      margin-right: 20px;
    }

    .current-model {
      margin: 0 auto;
      font-size: 1.4rem;
      font-weight: 600;
      color: #0b3d91;
      text-align: center;
      flex: 1;
      letter-spacing: -0.02em;
}

    /* Floating Menu */
    .model-menu {
      position: absolute;
      top: 78px;
      left: 32px;
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15);
      min-width: 280px;
      max-width: 400px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 300;
      opacity: 0;
      transform: translateY(-15px);
      transition: all 0.3s ease;
      pointer-events: none;
    }

    .model-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .model-item {
      padding: 16px 28px;
      cursor: pointer;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.2s;
    }

    .model-item:last-child { border-bottom: none; }
    .model-item:hover { background: #f8f9fa; }
    .model-item.active { background: #e6f0ff; color: #0b3d91; }

    .model-name {
      font-weight: 500;
      font-size: 1.08rem;
    }

    model-viewer {
      width: 100%;
      height: calc(100vh - 72px);
      background: #f8f9fa;
    }

    /* Download Button */
    .download-btn {
      background: #0b3d91;
      color: white;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .download-btn:hover {
      background: #0a2e70;
      transform: translateY(-1px);
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #666;
      z-index: 400;
      display: none;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 5px solid #eee;
      border-top: 5px solid #0b3d91;
      border-radius: 50%;
      animation: spin 1.3s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="header">
  <button class="hamburger" id="hamburger">☰</button>
  <span class="menu-label">Select Model</span>
  <div class="current-model" id="current-model">—</div>
  <button id="download-btn" class="download-btn">↓ Download Model</button>
</div>

  <!-- Floating Menu -->
  <div class="model-menu" id="model-menu">
    <div id="model-list"></div>
  </div>

  <model-viewer id="viewer"
    camera-controls
    auto-rotate="false"
    shadow-intensity="1.0"
    exposure="0.95"
    environment-intensity="0.9"
    ar
    ar-modes="webxr scene-viewer quick-look">

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading model...</div>
    </div>
  </model-viewer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const modelMenu = document.getElementById('model-menu');
    const viewer = document.getElementById('viewer');
    const currentTitle = document.getElementById('current-model');
    const downloadBtn = document.getElementById('download-btn');
    const loadingEl = document.getElementById('loading');

    let currentModelName = null;
    let menuOpen = false;

    const isLocal = location.hostname === "localhost" || 
                    location.hostname === "127.0.0.1" || 
                    location.protocol === "file:";

    // Hamburger menu toggle
    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      menuOpen = !menuOpen;
      modelMenu.classList.toggle('open', menuOpen);
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !modelMenu.contains(e.target)) {
        menuOpen = false;
        modelMenu.classList.remove('open');
      }
    });

    async function loadModels() {
      try {
        const res = await fetch('models.json');
        const data = await res.json();
        const models = data.models || [];

        models.forEach((model, i) => {
          const div = document.createElement('div');
          div.className = 'model-item';
          div.innerHTML = `<span class="model-name">${model.name}</span>`;
          div.onclick = () => {
            loadModel(model);
            if (window.innerWidth < 900) {
              menuOpen = false;
              modelMenu.classList.remove('open');
            }
          };
          document.getElementById('model-list').appendChild(div);

          if (i === 0) loadModel(model);
        });
      } catch (e) {
        console.error("Failed to load models.json", e);
      }
    }

    function loadModel(model) {
      if (currentModelName === model.name) return;
      currentModelName = model.name;

      const glbUrl = isLocal 
        ? `../../models/${model.folder}/${model.folder}.glb`
        : `https://media.githubusercontent.com/media/matthewgiarra/spacecraft-models/refs/heads/main/models/${model.folder}/${model.folder}.glb`;

      loadingEl.style.display = 'block';
      viewer.src = glbUrl;

      currentTitle.textContent = model.name;

      // Real button download handler
      downloadBtn.onclick = () => {
        const link = document.createElement('a');
        link.href = glbUrl;
        link.download = `${model.folder}.glb`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      viewer.addEventListener('load', () => {
        loadingEl.style.display = 'none';
      }, { once: true });
    }

    // Initialize
    loadModels();
  </script>
</body>
</html>
