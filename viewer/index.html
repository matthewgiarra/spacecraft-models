<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NASA Spacecraft • 3D Explorer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif;
      background: #05070f; color: #e0e0e0; overflow: hidden; height: 100vh;
      touch-action: none; /* Important for mobile */
    }

    .header {
      background: #0a0c1a;
      padding: 16px 20px;
      border-bottom: 1px solid #1a1f38;
      display: flex;
      align-items: center;
      z-index: 200;
    }

    .hamburger {
      font-size: 28px;
      background: none;
      border: none;
      color: #ccc;
      cursor: pointer;
      padding: 4px 12px;
      margin-right: 12px;
    }

    .menu-label {
      font-size: 1.05rem;
      font-weight: 500;
      color: #aaa;
      margin-right: 20px;
    }

    /* Floating Dropdown */
    .model-menu {
      position: absolute;
      top: 68px;
      left: 20px;
      background: #0f1324;
      border: 1px solid #1a1f38;
      border-radius: 10px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.7);
      min-width: 260px;
      max-width: 380px;
      max-height: 70vh;
      overflow-y: auto;
      z-index: 300;
      opacity: 0;
      transform: translateY(-10px);
      transition: all 0.25s ease;
      pointer-events: none;
    }

    .model-menu.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }

    .model-item {
      padding: 14px 24px;
      cursor: pointer;
      border-bottom: 1px solid #1a1f38;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .model-item:last-child { border-bottom: none; }
    .model-item:hover { background: #1a1f38; }
    .model-item.active { background: rgba(11, 61, 145, 0.4); }

    .model-name {
      font-weight: 500;
      font-size: 1.08rem;
    }

    model-viewer {
      width: 100%;
      height: calc(100vh - 61px);
      background: #05070f;
      touch-action: none;   /* Prevent page scroll */
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #777;
      z-index: 400;
      display: none;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 6px solid #1a1f38;
      border-top: 6px solid #00b4d8;
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="header">
    <button class="hamburger" id="hamburger">☰</button>
    <span class="menu-label">Select Model</span>
    <div style="flex: 1;"></div>
    <a id="download-btn" href="#" class="download-btn" download>↓ GLB</a>
  </div>

  <!-- Floating Menu -->
  <div class="model-menu" id="model-menu">
    <div id="model-list"></div>
  </div>

  <model-viewer id="viewer"
    camera-controls
    auto-rotate="false"
    shadow-intensity="1.0"
    exposure="0.92"
    environment-intensity="0.85"
    ar
    ar-modes="webxr scene-viewer quick-look">

    <div class="loading" id="loading">
      <div class="spinner"></div>
      <div>Loading spacecraft...</div>
    </div>
  </model-viewer>

  <script>
    const hamburger = document.getElementById('hamburger');
    const modelMenu = document.getElementById('model-menu');
    const viewer = document.getElementById('viewer');
    const loadingEl = document.getElementById('loading');
    const currentTitle = document.getElementById('current-model'); // not used but kept

    let currentModelName = null;
    let menuOpen = false;

    const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";

    // Hamburger menu
    hamburger.addEventListener('click', (e) => {
      e.stopPropagation();
      menuOpen = !menuOpen;
      modelMenu.classList.toggle('open', menuOpen);
    });

    // Close menu when clicking outside
    document.addEventListener('click', (e) => {
      if (!hamburger.contains(e.target) && !modelMenu.contains(e.target)) {
        menuOpen = false;
        modelMenu.classList.remove('open');
      }
    });

    async function loadModels() {
      try {
        const res = await fetch('models.json');
        const data = await res.json();
        const models = data.models || [];

        models.forEach((model, i) => {
          const div = document.createElement('div');
          div.className = 'model-item';
          div.innerHTML = `<span class="model-name">${model.name}</span>`;
          div.onclick = () => {
            loadModel(model);
            if (window.innerWidth < 900) {
              menuOpen = false;
              modelMenu.classList.remove('open');
            }
          };
          document.getElementById('model-list').appendChild(div);

          if (i === 0) loadModel(model);
        });
      } catch (e) {
        console.error("Failed to load models.json", e);
      }
    }

    function loadModel(model) {
      if (currentModelName === model.name) return;
      currentModelName = model.name;

      const glbUrl = isLocal 
        ? `../../models/${model.folder}/${model.folder}.glb`
        : `https://media.githubusercontent.com/media/matthewgiarra/spacecraft-models/refs/heads/main/models/${model.folder}/${model.folder}.glb`;

      loadingEl.style.display = 'block';
      viewer.src = glbUrl;

      viewer.addEventListener('load', () => {
        loadingEl.style.display = 'none';
      }, { once: true });
    }

    // Initialize
    loadModels();
  </script>
</body>
</html>
