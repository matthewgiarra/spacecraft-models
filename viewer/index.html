<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Viewer • NASA Spacecraft</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --nasa-blue: #0b3d91;
      --accent: #00b4d8;
    }

    body {
      margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif;
      background: #05070f; color: #e0e0e0; overflow: hidden; height: 100vh; display: flex;
    }

    .sidebar {
      width: 380px;
      background: #0a0c1a;
      border-right: 1px solid #1a1f38;
      overflow-y: auto;
      padding: 32px 0;
    }

    .sidebar h1 {
      padding: 0 32px 32px;
      margin: 0;
      font-size: 1.75rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.02em;
    }

    .model-item {
      display: flex;
      align-items: center;
      padding: 14px 32px;
      cursor: pointer;
      transition: all 0.25s ease;
      border-bottom: 1px solid #1a1f38;
    }

    .model-item:hover { background: #11141f; }
    .model-item.active { 
      background: rgba(11, 61, 145, 0.3); 
      border-left: 4px solid var(--nasa-blue);
    }

    .model-name {
      font-weight: 500;
      font-size: 1.07rem;
    }

    .main { flex: 1; display: flex; flex-direction: column; }

    .header {
      background: #0a0c1a;
      padding: 24px 40px;
      border-bottom: 1px solid #1a1f38;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h2 {
      margin: 0;
      font-size: 1.45rem;
      font-weight: 600;
      color: #ddd;
    }

    model-viewer {
      flex: 1;
      width: 100%;
      background: #05070f;
    }

    /* Loading */
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #777;
      z-index: 100;
      display: none;
    }
    .spinner {
      width: 56px;
      height: 56px;
      border: 6px solid #1a1f38;
      border-top: 6px solid var(--accent);
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .download-btn {
      background: var(--nasa-blue);
      color: white;
      padding: 11px 26px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.2s;
    }
    .download-btn:hover { background: #0a4a9e; }
  </style>
</head>
<body>

  <div class="sidebar">
    <h1>NASA Spacecraft</h1>
    <div id="model-list"></div>
  </div>

  <div class="main">
    <div class="header">
      <h2 id="current-model">Select a spacecraft</h2>
      <a id="download-btn" href="#" class="download-btn" download>↓ Download</a>
    </div>
    
    <model-viewer id="viewer"
      camera-controls
      auto-rotate
      shadow-intensity="1.0"
      exposure="0.92"
      environment-intensity="0.85"
      ar
      ar-modes="webxr scene-viewer quick-look">

      <div class="loading" id="loading">
        <div class="spinner"></div>
        <div>Loading spacecraft...</div>
      </div>
    </model-viewer>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const listEl = document.getElementById('model-list');
    const currentTitle = document.getElementById('current-model');
    const downloadBtn = document.getElementById('download-btn');
    const loadingEl = document.getElementById('loading');

    let currentModelName = null;

    const isLocal = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.protocol === "file:";

    async function loadModels() {
      try {
        const res = await fetch('models.json');
        const data = await res.json();
        const models = data.models || [];

        models.forEach((model, i) => {
          const div = document.createElement('div');
          div.className = 'model-item';
          div.innerHTML = `<span class="model-name">${model.name}</span>`;
          div.onclick = () => loadModel(model);
          listEl.appendChild(div);

          if (i === 0) loadModel(model);
        });
      } catch (e) {
        console.error("Failed to load models.json", e);
      }
    }

    function loadModel(model) {
      if (currentModelName === model.name) return;
      currentModelName = model.name;

      const glbUrl = isLocal 
        ? `../../models/${model.folder}/${model.folder}.glb`
        : `https://media.githubusercontent.com/media/matthewgiarra/spacecraft-models/refs/heads/main/models/${model.folder}/${model.folder}.glb`;

      loadingEl.style.display = 'block';
      viewer.src = glbUrl;

      currentTitle.textContent = model.name;
      downloadBtn.href = glbUrl;
      downloadBtn.download = `${model.folder}.glb`;

      document.querySelectorAll('.model-item').forEach(item => {
        item.classList.toggle('active', item.textContent === model.name);
      });

      viewer.addEventListener('load', () => loadingEl.style.display = 'none', { once: true });
      viewer.addEventListener('error', () => loadingEl.style.display = 'none', { once: true });
    }

    loadModels();
  </script>
</body>
</html>
