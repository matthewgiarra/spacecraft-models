<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft 3D Viewer</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      overflow: hidden;
      height: 100vh;
      display: flex;
    }

    .sidebar {
      width: 340px;
      background: #111111;
      border-right: 1px solid #222222;
      overflow-y: auto;
      padding: 20px 0;
    }

    .sidebar h1 {
      padding: 0 24px 24px;
      margin: 0;
      font-size: 1.5rem;
      color: #0b3d91;
    }

    .model-item {
      padding: 14px 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid #1a1a1a;
      display: flex;
      align-items: center;
    }

    .model-item:hover { background: #1a1a1a; }
    .model-item.active { background: #0b3d91; }

    .model-name {
      font-weight: 500;
      font-size: 1.08rem;
    }

    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #111111;
      padding: 16px 28px;
      border-bottom: 1px solid #222222;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .header h2 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 500;
    }

    model-viewer {
      flex: 1;
      width: 100%;
      background: radial-gradient(circle at center, #1f1f1f, #0a0a0a);
    }

    .download-btn {
      background: #0b3d91;
      color: white;
      padding: 9px 20px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 500;
    }

    .download-btn:hover {
      background: #0a2e70;
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <h1>NASA Spacecraft</h1>
    <div id="model-list"></div>
  </div>

  <!-- Main Viewer -->
  <div class="main">
    <div class="header">
      <h2 id="current-model">Select a spacecraft</h2>
      <a id="download-btn" href="#" class="download-btn" download>
        ↓ Download Model
      </a>
    </div>
    
    <model-viewer id="viewer"
      camera-controls
      auto-rotate
      shadow-intensity="1.2"
      exposure="0.95"
      environment-intensity="0.85"
      ar
      ar-modes="webxr scene-viewer quick-look">
    </model-viewer>
  </div>

  <script>
    const viewer = document.getElementById('viewer');
    const listEl = document.getElementById('model-list');
    const currentTitle = document.getElementById('current-model');
    const downloadBtn = document.getElementById('download-btn');

    async function loadModels() {
      try {
        // Now loading from the same folder as index.html
        const response = await fetch('models.json');

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}: models.json not found`);
        }

        const data = await response.json();
        const models = data.models || [];

        if (models.length === 0) {
          currentTitle.textContent = "No models found";
          return;
        }

        models.forEach((model, index) => {
          const div = document.createElement('div');
          div.className = 'model-item';
          div.innerHTML = `<span class="model-name">${model.name}</span>`;
          div.onclick = () => loadModel(model);
          listEl.appendChild(div);

          // Load first model automatically
          if (index === 0) {
            loadModel(model);
          }
        });

      } catch (error) {
        console.error("Failed to load models.json:", error);
        currentTitle.textContent = "Failed to load models.json";
        
        if (window.location.protocol === "file:") {
          currentTitle.innerHTML = `Local testing issue.<br>
            Please run:<br>
            <code>python3 -m http.server 8000</code><br>
            Then open: http://localhost:8000/viewer/`;
        }
      }
    }

    function loadModel(model) {
      const modelPath = `../models/${model.folder}/${model.filename}`;
      
      viewer.src = modelPath;
      currentTitle.textContent = model.name;

      downloadBtn.href = modelPath;
      downloadBtn.download = model.filename;

      // Highlight active item
      document.querySelectorAll('.model-item').forEach(item => {
        item.classList.toggle('active', item.textContent === model.name);
      });
    }

    // Initialize
    loadModels();
  </script>
</body>
</html>
