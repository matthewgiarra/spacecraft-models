<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft 3D Models</title>
  <style>
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #0a0a0a;
      color: #ddd;
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { color: #0b3d91; }
    iframe {
      width: 100%;
      height: 720px;
      border: 2px solid #333;
      border-radius: 12px;
      background: #111;
    }
    .note {
      background: #1a1a1a;
      padding: 15px 20px;
      border-radius: 8px;
      margin: 20px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>NASA Spacecraft 3D Collection</h1>
    <p class="note">
      Interactive 3D viewer • Drag to rotate • Scroll to zoom • Sidebar to switch models
    </p>

    <h2>Live 3D Viewer</h2>
    <iframe src="viewer/" 
            title="NASA 3D Spacecraft Viewer"
            allowfullscreen>
    </iframe>

    <p style="margin-top: 30px; text-align: center;">
      <a href="viewer/" target="_blank" style="color:#0b3d91;">
        → Open Viewer in Full Screen
      </a>
    </p>
  </div>
</body>
</html>
