<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft • 3D Collection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    :root {
      --nasa-blue: #0b3d91;
      --accent: #00b4d8;
    }

    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #05070f;
      color: #e0e0e0;
      line-height: 1.6;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 40px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 60px;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      margin: 0 0 12px 0;
      color: white;
      letter-spacing: -0.03em;
    }

    .subtitle {
      font-size: 1.35rem;
      color: #aaa;
      max-width: 700px;
      margin: 0 auto;
    }

    .viewer-container {
      background: #0a0c1a;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
      border: 1px solid #1a1f38;
    }

    iframe {
      width: 100%;
      height: 780px;
      border: none;
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 60px;
      color: #666;
      font-size: 0.95rem;
    }

    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Spacecraft Models</h1>
      <p class="subtitle">3D models of spacecraft from <a href="https://eyes.nasa.gov/apps/solar-system/" target="_blank">NASA Eyes On The Solar System</a> </p>
      <p class="subsubtitle"> View and download models using the viewer below, or from the <a href="https://github.com/matthewgiarra/spacecraft-models" target="_blank">Github page</a> </p>
      
    </header>

    <div class="viewer-container">
      <iframe src="viewer/" 
              title="NASA Spacecraft 3D Viewer"
              allowfullscreen>
      </iframe>
    </div>

    <div class="footer">
      Collection curated by Matt Giarra in 2026
    </div>
  </div>
</body>
</html>
