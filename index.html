<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NASA Spacecraft 3D Collection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    body {
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f8f9fa;
      color: #1a1a1a;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 40px 100px;
    }

    header {
      text-align: center;
      margin-bottom: 80px;
    }

    h1 {
      font-size: 3.8rem;
      font-weight: 700;
      margin: 0 0 16px 0;
      color: #0b3d91;
      letter-spacing: -0.04em;
    }

    .subtitle {
      font-size: 1.45rem;
      color: #555;
      max-width: 720px;
      margin: 0 auto;
      line-height: 1.5;
    }

    .viewer-wrapper {
      background: white;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.12);
      border: 1px solid #e0e0e0;
    }

    iframe {
      width: 100%;
      height: 820px;
      border: none;
      display: block;
    }

    .footer {
      text-align: center;
      margin-top: 80px;
      color: #777;
      font-size: 1rem;
    }

    .footer a {
      color: #0b3d91;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Spacecraft Models</h1>
      <p class="subtitle"> 3D models of spacecraft from <a href="https://eyes.nasa.gov/apps/solar-system/" target="_blank"> NASA Eyes On The Solar System </a></p>
      <p class="subsubtitle"> View and download models using the viewer below. Download the complete collection and read documentation at the <a href="https://github.com/matthewgiarra/spacecraft-models/" target="_blank"> Github page.</a></p>
    </header>

    <div class="viewer-wrapper">
      <iframe src="viewer/" title="NASA 3D Spacecraft Viewer" allowfullscreen></iframe>
    </div>

    <div class="footer">
      Collection curated by Matt Giarra in 2026 • 
      <a href="viewer/" target="_blank">Open Fullscreen Viewer</a>
    </div>
  </div>
</body>
</html>
